version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=proje_db
      - DB_USER=postgres
      - DB_PASS=sifre123
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=proje_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=sifre123
    ports:
      - "5432:5432"
    volumes:
      - postgres_veri:/var/lib/postgresql/data

volumes:
  postgres_veri: